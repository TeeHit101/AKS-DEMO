# pre-commit configuration for Windows Terraform projects
# See https://pre-commit.com for more information

repos:
  # Standard Git Hooks (bästa praxis för kodhygien - fungerar bra på alla OS)
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict
      - id: check-added-large-files

  # Lokala, Windows-native hooks för Terraform (slipper bash-beroenden)
  - repo: local
    hooks:
      # Kontrollerar formatering för alla .tf-filer rekursivt
      - id: terraform-fmt
        name: Terraform fmt
        entry: terraform fmt -check -recursive
        language: system
        files: \.tf$
        pass_filenames: false

      # Validerar bootstrap-katalogen om filer ändras där
      - id: terraform-validate-bootstrap
        name: Terraform validate (bootstrap)
        entry: powershell -Command "cd bootstrap; terraform validate"
        language: system
        files: ^bootstrap/.*\.tf$
        pass_filenames: false
